env:
  robot: franka_panda
  model_path: assets/franka_panda/panda.xml
  episode_length: 300
  control_dt: 0.02
  frame_skip: 5
  seed: 7
  gravity: [0.0, 0.0, 0.0]

trajectory:
  type: figure_eight
  radius: 0.08
  amplitude_x: 0.08
  amplitude_y: 0.05
  center: [0.45, -0.02, 0.42]
  frequency: 0.20
  target_noise_std: 0.005

rl:
  algorithm: SAC
  total_timesteps: 1000000
  learning_rate: 0.0003
  buffer_size: 100000
  batch_size: 128
  gamma: 0.99
  tau: 0.005
  learning_starts: 500

control:
  residual_scale: 0.06
  residual_filter_beta: 0.8
  target_lookahead: 0.04
  ik_damping: 0.05
  ik_gain: 8.0
  max_joint_velocity: 1.2
  home_qpos: [0.039701453, 0.11233248, -0.283563988, -2.28915042, 0.147905963, 2.49134334, 0.0]

uncertainty:
  observation_noise_std: 0.0
  action_noise_std: 0.0
  action_delay_steps: 0
  unreachable_target_prob: 0.0
  unreachable_offset: [0.12, 0.0, 0.06]

reward:
  w_pos: 25.0
  w_vel: 1.0
  w_action: 0.03
  w_smooth: 0.35
  w_jerk: 0.15
  w_joint_limit: 1.0
